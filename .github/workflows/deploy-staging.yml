name: Deploy staging

on:
  push:
    branches: [main]

concurrency:
  group: staging-db-app-inngest
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm test

      - name: Create Vercel preview deployment
        id: deploy
        run: |
          output=$(npx vercel@54.0.0 deploy \
            --target=preview \
            --yes \
            --scope=start-berlin 2>&1); vercel_exit=$?
          echo "$output"
          [ $vercel_exit -ne 0 ] && exit $vercel_exit
          deployment_url=$(echo "$output" | grep -oE 'https://[a-zA-Z0-9-]+\.vercel\.app' | tail -1)
          echo "url=$deployment_url" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Smoke test preview deployment
        run: curl --fail "${{ steps.deploy.outputs.url }}/api/health"

  migrate:
    needs: build
    runs-on: ubuntu-latest
    environment: preview

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Apply staging database migrations
        run: npm run db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_STAGING }}

  sync-inngest:
    needs: migrate
    runs-on: ubuntu-latest
    environment: preview

    steps:
      - name: Sync Inngest staging
        run: |
          curl --fail -X POST "https://api.inngest.com/v2/apps/$INNGEST_APP_ID/syncs" \
            -H "Authorization: Bearer $INNGEST_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"url\":\"$INNGEST_APP_URL\"}"
        env:
          INNGEST_API_KEY: ${{ secrets.INNGEST_API_KEY_STAGING }}
          INNGEST_APP_ID: ${{ secrets.INNGEST_APP_ID_STAGING }}
          INNGEST_APP_URL: https://staging.cockpit.start-berlin.com/api/inngest
