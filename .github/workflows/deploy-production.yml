name: Deploy production

on:
  push:
    branches: [production]

concurrency:
  group: production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-and-stage:
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm test

      - name: Create Vercel production deployment (skip-domain)
        id: deploy
        run: |
          output=$(npx --no-install vercel deploy \
            --prod \
            --skip-domain \
            --yes \
            --scope=start-berlin 2>&1)

          echo "$output"
          deployment_url=$(echo "$output" | grep -oE 'https://[a-zA-Z0-9-]+\.vercel\.app' | tail -1)
          echo "url=$deployment_url" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Smoke test staged deployment
        run: curl --fail "${{ steps.deploy.outputs.url }}/api/health"

  promote-and-migrate:
    needs: build-and-stage
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Apply production database migrations
        run: npm run db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PROD }}

      - name: Promote production deployment
        run: |
          npx --no-install vercel promote \
            "${{ needs.build-and-stage.outputs.url }}" \
            --yes \
            --timeout=5m \
            --scope start-berlin
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Smoke test production domain
        run: curl --fail "https://cockpit.start-berlin.com/api/health"

      - name: Sync Inngest production
        run: |
          curl --fail -X POST "https://api.inngest.com/v2/apps/$INNGEST_APP_ID/syncs" \
            -H "Authorization: Bearer $INNGEST_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"url\":\"$INNGEST_APP_URL\"}"
        env:
          INNGEST_API_KEY: ${{ secrets.INNGEST_API_KEY_PROD }}
          INNGEST_APP_ID: ${{ secrets.INNGEST_APP_ID_PROD }}
          INNGEST_APP_URL: https://cockpit.start-berlin.com/api/inngest
